<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="King's Advantage Elite Nutrition">
  <!-- Stand-in for the round King's Advantage badge. Drop kings-advantage.png into assets/logos/ to replace. -->
  <circle cx="120" cy="120" r="118" fill="#111111"/>
  <circle cx="120" cy="120" r="110" fill="none" stroke="#c9a24b" stroke-width="2"/>
  <path id="ka-top" d="M 34 120 A 86 86 0 0 1 206 120" fill="none"/>
  <path id="ka-bot" d="M 30 120 A 90 90 0 0 0 210 120" fill="none"/>
  <text font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="19" fill="#f4ead8" letter-spacing="1.5">
    <textPath href="#ka-top" startOffset="50%" text-anchor="middle">KING'S ADVANTAGE</textPath>
  </text>
  <text font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" fill="#c9a24b" letter-spacing="2">
    <textPath href="#ka-bot" startOffset="50%" text-anchor="middle">ELITE NUTRITION</textPath>
  </text>
  <!-- playing-card king motif -->
  <g stroke="#c9a24b" stroke-width="4" fill="none" stroke-linecap="round">
    <rect x="96" y="86" width="48" height="68" rx="6"/>
    <path d="M104 120 h32 M104 132 h32"/>
    <path d="M110 100 l10 12 10-12"/>
  </g>
  <path d="M64 114 c0-6 10-6 10 0 c0 5-10 10-10 10 s-10-5-10-10 c0-6 10-6 10 0" fill="#c9a24b" transform="translate(0,4) scale(0.9)"/>
  <path d="M176 108 c-6 8-6 14 0 14 c6 0 6-6 0-14 M176 122 v8" stroke="#c9a24b" stroke-width="4" fill="#c9a24b"/>
</svg>
