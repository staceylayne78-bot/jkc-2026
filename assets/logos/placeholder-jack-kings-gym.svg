  <text x="150" y="58" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="44" fill="#111" letter-spacing="1">JACK</text>
  <text x="150" y="106" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="44" fill="#111" letter-spacing="1">KING'S</text>
