# Static site — no build step. Publish the repo root.
[build]
  publish = "."

# The service worker must never be cached by the HTTP layer,
# or version bumps would take a full browser-cache cycle to land.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/data.js"
  [headers.values]
    Cache-Control = "no-cache"

# Fonts and images are fingerprint-stable for the event's lifetime — cache hard.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
