<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380" role="img" aria-label="Jack King's Classic crest">
  <!-- Simplified stand-in for the JKC crest: crown, crossed swords, shield with athlete silhouettes, red banner.
       Swap for the real artwork by dropping jkc-crest.png into assets/logos/. -->
  <defs>
    <style>
      .navy{fill:#2b3a7e}.gold{fill:#c9a24b}.red{fill:#c8102e}
    </style>
  </defs>
  <!-- crossed swords -->
  <g class="navy">
    <rect x="60" y="40" width="14" height="300" rx="6" transform="rotate(-35 67 190)"/>
    <rect x="326" y="40" width="14" height="300" rx="6" transform="rotate(35 333 190)"/>
    <rect x="30" y="96" width="90" height="12" rx="6" transform="rotate(-35 75 102)"/>
    <rect x="280" y="96" width="90" height="12" rx="6" transform="rotate(35 325 102)"/>
  </g>
  <!-- crown -->
  <path class="navy" d="M140 66 L160 22 L182 52 L200 12 L218 52 L240 22 L260 66 L252 88 L148 88 Z"/>
  <!-- gold flourishes -->
  <path class="gold" d="M70 140 q-40 60 10 130 q20 26 44 34 l-8-40 q-30-60-10-110 Z"/>
  <path class="gold" d="M330 140 q40 60 -10 130 q-20 26 -44 34 l8-40 q30-60 10-110 Z"/>
  <!-- shield -->
  <path class="gold" d="M108 96 h184 v120 q0 70 -92 118 q-92-48 -92-118 Z"/>
  <path class="navy" d="M122 110 h156 v104 q0 60 -78 102 q-78-42 -78-102 Z"/>
  <!-- male double-biceps silhouette -->
  <path class="gold" d="M158 150 q-14 2 -20 14 l-6 16 8 4 8-16 q4 12 2 26 l-4 42 q-2 26 6 44 h14 l2-38 h6 l2 38 h14 q8-18 6-44 l-4-42 q-2-14 2-26 l8 16 8-4 -6-16 q-6-12 -20-14 a14 14 0 1 0 -26 0 Z" transform="translate(8,0) scale(0.92)"/>
  <!-- female flex silhouette -->
  <path class="gold" d="M250 166 a11 11 0 1 1 0.1 0 M244 180 q-12 4 -14 18 l-4 14 8 3 6-15 q2 14 -2 26 l-6 34 q-2 22 4 38 h12 l2-32 h4 l2 32 h12 q6-16 4-38 l-6-34 q-4-12 -2-26 l6 15 8-3 -4-14 q-2-14 -14-18 Z" transform="translate(6,-6)"/>
  <!-- banner -->
  <path class="red" d="M40 288 l60 -18 v44 l-60 20 Z"/>
  <path class="red" d="M360 288 l-60 -18 v44 l60 20 Z"/>
  <path class="red" d="M96 266 q104 30 208 0 v44 q-104 30 -208 0 Z"/>
  <text x="200" y="302" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="21" fill="#fff" letter-spacing="0.5">JACK KING'S CLASSIC</text>
</svg>
